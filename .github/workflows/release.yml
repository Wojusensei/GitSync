name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Package tar.gz (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release
          tar -czvf GitSync-0.3.2-linux-x86_64.tar.gz git-tool

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-bundle
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/*
            src-tauri/target/x86_64-unknown-linux-gnu/release/GitSync-*.tar.gz